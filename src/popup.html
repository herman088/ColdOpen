<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="popup.css" />
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Oswald:wght@200..700&family=Quattrocento+Sans:ital,wght@0,400;0,700;1,400;1,700&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <!-- Saved Page button -->
    <svg
      id="savedPgBtn"
      xmlns="http://www.w3.org/2000/svg"
      width="200"
      height="200"
      viewBox="0 0 16 16"
    >
      <path
        d="M3.75 2a.75.75 0 0 0-.75.75v10.5a.75.75 0 0 0 1.28.53L8 10.06l3.72 3.72a.75.75 0 0 0 1.28-.53V2.75a.75.75 0 0 0-.75-.75z"
      />
    </svg>
    <!-- Main Page button -->
    <svg
      id="mainPgBtn"
      xmlns="http://www.w3.org/2000/svg"
      width="200"
      height="200"
      viewBox="0 0 16 16"
    >
      <path
        d="M2.5 2A1.5 1.5 0 0 0 1 3.5v5A1.5 1.5 0 0 0 2.5 10h7A1.5 1.5 0 0 0 11 8.5v-5A1.5 1.5 0 0 0 9.5 2h-7Zm2.585 11A1.5 1.5 0 0 0 6.5 14h3A5.5 5.5 0 0 0 15 8.5v-1a1.5 1.5 0 0 0-1-1.415V8.5A4.5 4.5 0 0 1 9.5 13H5.085ZM4.5 12a1.5 1.5 0 0 1-1.415-1H9.5A2.5 2.5 0 0 0 12 8.5V4.085A1.5 1.5 0 0 1 13 5.5v3A3.5 3.5 0 0 1 9.5 12h-5Z"
      />
    </svg>
    <!-- Settings button -->
    <svg
      id="settingsIcon"
      xmlns="http://www.w3.org/2000/svg"
      width="200"
      height="200"
      viewBox="0 0 16 16"
    >
      <path
        d="M2.267 6.153A5.986 5.986 0 0 1 3.53 3.98a.355.355 0 0 1 .382-.095l1.36.484a.71.71 0 0 0 .935-.538l.26-1.416a.354.354 0 0 1 .274-.282a6.072 6.072 0 0 1 2.52 0c.14.03.248.141.274.282l.26 1.416a.708.708 0 0 0 .935.538l1.36-.484a.355.355 0 0 1 .382.095a5.99 5.99 0 0 1 1.262 2.173a.352.352 0 0 1-.108.378l-1.102.931a.703.703 0 0 0 0 1.076l1.102.931c.11.093.152.242.108.378a5.985 5.985 0 0 1-1.262 2.173a.355.355 0 0 1-.382.095l-1.36-.484a.71.71 0 0 0-.935.538l-.26 1.416a.353.353 0 0 1-.275.282a6.068 6.068 0 0 1-2.519 0a.354.354 0 0 1-.275-.282l-.259-1.416a.708.708 0 0 0-.935-.538l-1.36.484a.355.355 0 0 1-.382-.095a5.986 5.986 0 0 1-1.262-2.173a.352.352 0 0 1 .108-.378l1.102-.931a.704.704 0 0 0 0-1.076l-1.102-.931a.352.352 0 0 1-.108-.378ZM6.25 8a1.75 1.75 0 1 0 3.5 0a1.75 1.75 0 0 0-3.5 0Z"
      />
    </svg>

    <!-- Settings overlay -->
    <div id="settings-overlay">
      <h2>Settings</h2>
      <label for="apiKey">Enter your API key:</label>
      <input type="password" id="apiKeyField" name="apiKey" />
      <button id="apiKeyBtn">Save</button>
      <span id="savedText">Saved</span>

      <div class="reading-levels">
        <label>Reading levels</label>

        <div class="level-buttons">
          <button type="button" class="basic" data-level="basic">Basic</button>

          <button type="button" class="medium" data-level="medium">
            Medium
          </button>

          <button type="button" class="expert" data-level="expert">
            Expert
          </button>
        </div>
      </div>
    </div>
    <button id="generateBtn">Generate</button>
    <div class="container">
      <!-- Card List -->
      <div class="card-list"></div>

      <div class="card-list-saved hidden">
        <div class="savedHeader">
          <h2 class="savedHeaderTxt">Saved Ideas</h2>
        </div>
      </div>

      <!-- Empty state placeholder -->
      <div class="empty-state">
        <div class="card-stack">
          <!-- Back card (smallest) -->
          <div class="ghost-card back-left"><img src="../main.PNG" /></div>
          <!-- Middle card -->
          <div class="ghost-card back-right"><img src="../main.PNG" /></div>
          <!-- Front card (largest) -->
          <div class="ghost-card front"><img src="../main.PNG" /></div>
        </div>
        <div id="status">
          <h3>Click button to analyze this page</h3>
          <div class="loader hidden"></div>
        </div>
      </div>
    </div>

    <script src="../dist/popup.bundle.js"></script>
  </body>
</html>
